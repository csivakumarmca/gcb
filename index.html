<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCB</title>
  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search || "");
        var targetPage = (p.get("page") || p.get("module") || "").trim();
        if (targetPage) document.documentElement.classList.add("gcb-router-mode");
      } catch (_) {}
    })();
  </script>
  <style>
    body { margin: 0; padding: 10px; font-family: Arial, Helvetica, sans-serif; background: #f4f6f8; color: #001b3d; font-size: 12px; }
    .gcb-card { max-width: 760px; margin: 10px auto; background: #fff; border: 1px solid #cfd9e3; border-radius: 10px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .gcb-title { font-size: 16px; font-weight: 700; color: #004982; margin-bottom: 8px; }
    .gcb-status { white-space: pre-wrap; line-height: 1.35; padding: 8px; border-radius: 6px; background: #e8f1ff; color: #0b4b88; word-break: break-word; margin-bottom: 10px; }
    .gcb-success { background: #e7f7e7; color: #146c2e; }
    .gcb-warning { background: #fff4d8; color: #8a5200; }
    .gcb-error { background: #fde7e7; color: #9b0000; }
    .status-table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: 12px; }
    .status-table td { padding: 7px 6px; border-bottom: 1px solid #e6edf5; vertical-align: top; }
    .status-table td:first-child { width: 130px; font-weight: 700; color: #34495e; }
    .status-ok { color: #146c2e; font-weight: 700; }
    .status-fail { color: #9b0000; font-weight: 700; }
    .status-pending { color: #7a5200; font-weight: 700; }
    .gcb-toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .gcb-btn { border: 1px solid #b8c5d6; background: #fff; color: #003b70; border-radius: 5px; padding: 5px 9px; font-size: 11px; cursor: pointer; }
    .gcb-btn:hover { background: #eef5ff; }
    .gcb-debug-log { display: none; background: #071727; color: #dbeafe; border-radius: 6px; padding: 10px; max-height: 240px; overflow: auto; font-family: Consolas, "Courier New", monospace; font-size: 11px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; margin-top: 8px; }
    .gcb-debug-log.show { display: block; }
    .meta { display: grid; grid-template-columns: 90px 1fr; gap: 4px 8px; margin-top: 8px; color: #405263; font-size: 11px; }
    .meta b { color: #001b3d; }
    html.gcb-router-mode body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
    html.gcb-router-mode .gcb-card { display: none !important; }
    .gcb-router-compact { display: none; }
    html.gcb-router-mode .gcb-router-compact {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      color: #52616f;
      background: transparent;
      padding: 2px 6px;
    }
    html.gcb-router-mode .gcb-router-compact span { opacity: 0.75; }
  </style>
</head>
<body>
  <div id="routerCompact" class="gcb-router-compact"><span>Opening GCB page...</span></div>
  <div class="gcb-card">
    <div class="gcb-title">Genesys Context Bridge (GCB)</div>
    <div id="gcbStatus" class="gcb-status">Initializing...</div>

    <table class="status-table" aria-label="GCB status summary">
      <tr><td>OAuth</td><td id="lineOauth"><span class="status-pending">Pending</span></td></tr>
      <tr><td>Chat Monitor</td><td id="lineSendGreeting"><span class="status-pending">Not run</span></td></tr>
      <tr><td>Hold / Resume</td><td id="lineHoldResume"><span class="status-pending">Not run</span></td></tr>
      <tr><td>Prospects</td><td id="lineProspects"><span class="status-pending">Not run</span></td></tr>
    </table>

    <div id="gcbMeta" class="meta"></div>

    <div class="gcb-toolbar">
      <button class="gcb-btn" id="refreshLogsBtn" type="button">Refresh</button>
      <button class="gcb-btn" id="toggleLogsBtn" type="button">Show details</button>
      <button class="gcb-btn" id="copyLogsBtn" type="button">Copy details</button>
      <button class="gcb-btn" id="clearLogsBtn" type="button">Clear</button>
    </div>
    <div id="centralDebugLog" class="gcb-debug-log">No logs yet.</div>
  </div>

  <script src="./js/gcb-debug.js"></script>
  <script src="./js/gcb-common.js"></script>
  <script src="./js/gcb-auth.js"></script>
  <script src="./js/genesys-api.js"></script>
  <script>
    (function () {
      "use strict";

      const ROUTER_VERSION = "v1.7.2.24-direct-auth-fallback";
      const C = window.RakCommon;
      const Auth = window.RakAuth;
      const Api = window.GenesysApi;
      const GCB_ACTIVE_HOLDS_KEY = "GCB_ACTIVE_HOLDS_V1";
      const GCB_HOLD_CHANNEL = "GCB_HOLD_MONITOR";
      const INDEX_PARAMS = new URLSearchParams(window.location.search || "");
      const CURRENT_CONVERSATION_ID = C.safeString(INDEX_PARAMS.get("conversationId") || INDEX_PARAMS.get("gcConversationId") || "");
      let centralHoldMonitorStarted = false;
      let centralHoldMonitorBusy = false;

      const MODULE_MAP = {
        "chatmonitor": "chatmonitor.html",
        "chat-monitor": "chatmonitor.html",
        "monitor": "chatmonitor.html",
        "conversation-monitor": "chatmonitor.html",
        "hold-resume": "holdresume.html",
        "holdresume": "holdresume.html",
        "hold": "holdresume.html",
        "holdtimer": "holdtimer.html",
        "hold-timer": "holdtimer.html",
        "timer": "holdtimer.html",
        "prospects": "prospects.html",
        "prospect": "prospects.html"
      };

      function $(id) { return document.getElementById(id); }

      function isRouterMode() {
        return document.documentElement.classList.contains("gcb-router-mode");
      }

      function setStatus(message, type) {
        const compact = $("routerCompact");
        if (compact && isRouterMode()) compact.textContent = message || "Opening GCB page...";
        const el = $("gcbStatus");
        if (!el) return;
        el.textContent = message || "";
        el.className = "gcb-status" + (type ? " gcb-" + type : "");
      }

      function mask(value) {
        const text = C.safeString(value);
        if (!text) return "Not provided";
        if (text.length <= 8) return "********";
        return text.substring(0, 4) + "..." + text.substring(text.length - 4);
      }

      function debugLog(level, step, message, data) {
        try { if (window.GcbDebug) window.GcbDebug.log(level, step, message, data); } catch (_) {}
      }

      function readCentralHoldRecords() {
        try {
          const raw = localStorage.getItem(GCB_ACTIVE_HOLDS_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function writeCentralHoldRecords(records) {
        try { localStorage.setItem(GCB_ACTIVE_HOLDS_KEY, JSON.stringify(records || {})); } catch (_) {}
      }

      function broadcastCentralHoldEvent(type, record) {
        try {
          if (typeof BroadcastChannel !== "undefined") {
            const channel = new BroadcastChannel(GCB_HOLD_CHANNEL);
            channel.postMessage({ type: type, record: record || null, time: new Date().toISOString() });
            channel.close();
          }
        } catch (_) {}
      }

      function isHoldDue(record, nowMs) {
        if (!record || record.status !== "HOLD" || record.resumeSent) return false;
        const maxSeconds = Number(record.maxHoldTime || 0);
        const startedAt = Number(record.holdStartTimeMs || 0);
        if (!maxSeconds || !startedAt) return false;
        return (nowMs - startedAt) >= (maxSeconds * 1000);
      }

      function isHoldPageActivelyHandling(record, nowMs) {
        if (!record) return false;
        if (record.activePageVisible !== true) return false;
        const heartbeat = Number(record.activePageHeartbeatMs || 0);
        if (!heartbeat) return false;
        return (nowMs - heartbeat) <= 5000;
      }

      function isStaleHoldRecord(record, nowMs) {
        const startedAt = Number(record && record.holdStartTimeMs || 0);
        return startedAt && (nowMs - startedAt) > (4 * 60 * 60 * 1000);
      }


      function notifyHoldExceededOnce(record) {
        try {
          if (!("Notification" in window) || Notification.permission !== "granted") return;
          const key = "GCB_HOLD_ALERT_SENT_" + C.safeString(record && record.key || "").replace(/[^a-zA-Z0-9_.:-]+/g, "_");
          if (localStorage.getItem(key)) return;
          localStorage.setItem(key, new Date().toISOString());
          const n = new Notification("SIVAKUMAR - RAKBANK", {
            body: "Maximum hold duration reached. Please click Resume to continue the chat.",
            tag: key,
            requireInteraction: false
          });
          setTimeout(function () { try { n.close(); } catch (_) {} }, 12000);
        } catch (_) {}
      }

      async function sendAutoResumeForRecord(record) {
        const token = Auth.getAccessToken();
        if (!token) throw new Error("OAuth token missing for central auto-resume.");
        if (!record.conversationId) throw new Error("conversationId missing in hold record.");
        if (!record.agentCommunicationId) throw new Error("agentCommunicationId missing in hold record.");
        if (!record.resumeMessageText) throw new Error("resumeMessageText missing in hold record.");
        await Api.sendMessage(token, record.conversationId, record.agentCommunicationId, record.resumeMessageText);
      }

      async function processCentralHoldMonitor(reason) {
        if (centralHoldMonitorBusy) return;
        centralHoldMonitorBusy = true;
        const nowMs = Date.now();
        try {
          const records = readCentralHoldRecords();
          let changed = false;
          const keys = Object.keys(records);

          for (const key of keys) {
            const record = records[key];

            // v1.7.2.20: this index page belongs to one Genesys conversation.
            // Do not show or process old hold records from another chat, otherwise a new chat
            // can incorrectly display "Maximum hold duration reached" from a previous interaction.
            if (CURRENT_CONVERSATION_ID && C.safeString(record && record.conversationId) !== CURRENT_CONVERSATION_ID) {
              continue;
            }

            if (isStaleHoldRecord(record, nowMs)) {
              delete records[key];
              changed = true;
              continue;
            }

            if (!isHoldDue(record, nowMs)) continue;

            if (record.autoResumeEnabled === false || String(record.autoResumeEnabled).toLowerCase() === "false") {
              record.status = "HOLD_EXCEEDED";
              record.resumeSent = false;
              record.holdExceededTimeUtc = new Date().toISOString();
              record.reason = reason || "CENTRAL_MONITOR_MAX_HOLD_TIME_MANUAL_RESUME";
              records[key] = record;
              writeCentralHoldRecords(records);
              broadcastCentralHoldEvent("HOLD_EXCEEDED", record);
              notifyHoldExceededOnce(record);
              if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "failed", "Maximum hold duration reached. Manual Resume required.");
              debugLog("INFO", "CENTRAL_HOLD_EXCEEDED", "key=" + key + " | conversationId=" + C.safeString(record.conversationId));
              changed = true;
              continue;
            }

            if (isHoldPageActivelyHandling(record, nowMs)) {
              debugLog("INFO", "CENTRAL_AUTO_RESUME_SKIP_ACTIVE_PAGE", "key=" + key + " | hold page is active; local hold page timer will handle auto-resume.");
              continue;
            }

            record.status = "RESUME_IN_PROGRESS";
            record.resumeSent = true;
            record.resumeAttemptTimeUtc = new Date().toISOString();
            record.resumeAttemptReason = reason || "CENTRAL_MONITOR_DUE";
            records[key] = record;
            writeCentralHoldRecords(records);
            broadcastCentralHoldEvent("RESUME_IN_PROGRESS", record);
            debugLog("INFO", "CENTRAL_AUTO_RESUME_START", "key=" + key + " | conversationId=" + C.safeString(record.conversationId));

            try {
              await sendAutoResumeForRecord(record);
              record.status = "RESUMED_AUTO";
              record.resumeTimeUtc = new Date().toISOString();
              record.reason = "CENTRAL_MONITOR_MAX_HOLD_TIME";
              records[key] = record;
              writeCentralHoldRecords(records);
              broadcastCentralHoldEvent("RESUMED_AUTO", record);
              if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "success", "Auto resume sent by central monitor.");
              debugLog("INFO", "CENTRAL_AUTO_RESUME_OK", "key=" + key + " | conversationId=" + C.safeString(record.conversationId));
              changed = true;
            } catch (error) {
              record.status = "HOLD";
              record.resumeSent = false;
              record.lastError = error && error.message ? error.message : String(error);
              record.lastErrorTimeUtc = new Date().toISOString();
              records[key] = record;
              writeCentralHoldRecords(records);
              broadcastCentralHoldEvent("AUTO_RESUME_FAILED", record);
              if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "failed", "Central auto-resume failed: " + record.lastError);
              debugLog("ERROR", "CENTRAL_AUTO_RESUME_FAILED", "key=" + key + " | " + record.lastError);
              changed = true;
            }
          }

          if (changed) renderCentralLogs();
        } finally {
          centralHoldMonitorBusy = false;
        }
      }

      function startCentralHoldMonitor() {
        if (centralHoldMonitorStarted) return;
        centralHoldMonitorStarted = true;
        debugLog("INFO", "CENTRAL_HOLD_MONITOR_START", "Local hold monitor active. No Genesys polling; auto-resume is controlled by autoResumeEnabled.");
        processCentralHoldMonitor("STARTUP");
        setInterval(function () { processCentralHoldMonitor("INTERVAL"); }, 2000);
        window.addEventListener("storage", function (event) {
          if (event && event.key === GCB_ACTIVE_HOLDS_KEY) processCentralHoldMonitor("STORAGE");
        });
        try {
          if (typeof BroadcastChannel !== "undefined") {
            const channel = new BroadcastChannel(GCB_HOLD_CHANNEL);
            channel.onmessage = function () { processCentralHoldMonitor("BROADCAST"); };
          }
        } catch (_) {}
      }

      function validateCurrentUrl() {
        const href = window.location.href;
        const issues = [];
        if (/%20\+%22|\+%20%22|\+\s*%22|%22\s*\+/i.test(href)) issues.push("URL contains script concatenation text like + quotes. Use the final evaluated URL variable only.");
        if (/https\/\//i.test(href)) issues.push("URL contains https// instead of https://.");
        if (/=https?:\/\//i.test(href) && !href.startsWith("http")) issues.push("URL appears to start with a variable assignment instead of a real URL.");
        if (href.includes("index.html%20")) issues.push("URL has encoded spaces after index.html.");
        return issues;
      }

      function statusClass(state) {
        const s = C.safeString(state).toLowerCase();
        if (s === "success") return "status-ok";
        if (s === "failed") return "status-fail";
        return "status-pending";
      }

      function statusText(status, defaultText) {
        if (!status || !status.state) return defaultText || "Not run";
        const state = status.state === "success" ? "Success" : status.state === "failed" ? "Failed" : "Pending";
        return state + (status.reason ? " - " + status.reason : "");
      }

      function setLine(id, status, defaultText) {
        const el = $(id);
        if (!el) return;
        const cls = statusClass(status && status.state);
        el.innerHTML = '<span class="' + cls + '">' + C.escapeHtml(statusText(status, defaultText)) + '</span>';
      }

      function renderStatusLines() {
        const statuses = window.GcbDebug ? window.GcbDebug.getStatuses() : {};
        const issues = validateCurrentUrl();
        setLine("lineOauth", statuses.oauth, "Pending");
        setLine("lineSendGreeting", statuses.sendGreeting, "Not run");
        setLine("lineHoldResume", statuses.holdResume, "Not run");
        setLine("lineProspects", statuses.prospects, "Not run");
        if (issues.length) {
          setStatus("URL issue detected: " + issues.join(" | "), "error");
        }
      }

      function renderMeta(user) {
        const meta = $("gcbMeta");
        if (!meta) return;
        const params = new URLSearchParams(window.location.search || "");
        meta.innerHTML = "";
        const rows = [
          ["Build", ROUTER_VERSION],
          ["Region", Auth.getRegion()],
          ["Client", mask(Auth.getClientId())],
          ["Conv", mask(params.get("conversationId") || params.get("gcConversationId"))],
          ["Page", params.get("page") || params.get("module") || "None"]
        ];
        if (user) rows.push(["User", C.safeString(user.name || user.email || user.id) || "Validated"]);
        rows.forEach(function (r) {
          const k = document.createElement("b"); k.textContent = r[0];
          const v = document.createElement("div"); v.textContent = r[1] || "Not provided";
          meta.appendChild(k); meta.appendChild(v);
        });
      }

      function formatEvent(e) {
        return [e.time, e.level, e.module, e.step, e.message, e.data || ""].filter(Boolean).join(" | ");
      }

      function renderCentralLogs() {
        const el = $("centralDebugLog");
        if (!el) return;
        const events = window.GcbDebug ? window.GcbDebug.getEvents().slice(-120).reverse() : [];
        el.textContent = events.length ? events.map(formatEvent).join("\n") : "No logs yet.";
        renderStatusLines();
      }

      function setupButtons() {
        const refresh = $("refreshLogsBtn");
        const clear = $("clearLogsBtn");
        const copy = $("copyLogsBtn");
        const toggle = $("toggleLogsBtn");
        const logBox = $("centralDebugLog");
        if (refresh) refresh.onclick = renderCentralLogs;
        if (clear) clear.onclick = function () { if (window.GcbDebug) window.GcbDebug.clear(); renderCentralLogs(); };
        if (copy) copy.onclick = async function () {
          const text = window.GcbDebug ? window.GcbDebug.exportText() : "";
          try { await navigator.clipboard.writeText(text); setStatus("Debug details copied.", "success"); }
          catch (_) { setStatus("Unable to copy automatically. Open details and copy manually.", "warning"); }
        };
        if (toggle && logBox) toggle.onclick = function () {
          logBox.classList.toggle("show");
          toggle.textContent = logBox.classList.contains("show") ? "Hide details" : "Show details";
        };
        window.addEventListener("gcb-debug-event", renderCentralLogs);
        window.addEventListener("gcb-status-event", renderStatusLines);
        setInterval(renderCentralLogs, 5000);
      }

      function getModuleName() { return C.safeString(C.getParam("page") || C.getParam("module")).toLowerCase(); }

      function buildTargetUrl(moduleFile) {
        const params = new URLSearchParams(window.location.search || "");
        params.delete("code");
        params.delete("state");
        params.delete("page");
        params.delete("module");
        params.set("routedFrom", "index");
        const query = params.toString();
        return moduleFile + (query ? "?" + query : "");
      }

      async function loadModule(moduleName) {
        const moduleFile = MODULE_MAP[moduleName];
        if (!moduleFile) throw new Error("Invalid GCB page/module: " + moduleName);
        const targetUrl = buildTargetUrl(moduleFile);
        setStatus("OAuth success. Opening " + moduleName + "...", "success");
        debugLog("INFO", "ROUTE_TO_PAGE", moduleName + " -> " + targetUrl);
        window.location.replace(targetUrl);
      }

      async function start() {
        setupButtons();
        renderMeta(null);
        renderCentralLogs();
        setStatus("Checking OAuth / MFA...", "warning");

        if (await Auth.handleOAuthRedirectIfPresent()) return;

        const token = await Auth.ensureToken();
        if (!token) return;

        let user = null;
        try {
          user = await Api.getCurrentUser(token);
          if (window.GcbDebug) window.GcbDebug.setStatus("oauth", "success", "OAuth completed and Genesys access validated.");
        } catch (error) {
          if (window.GcbDebug) window.GcbDebug.setStatus("oauth", "failed", error && error.message ? error.message : String(error));
          if (Auth.isAuthError(error)) {
            Auth.clearToken();
            await Auth.startPKCELogin({ restoreUrl: window.location.href });
            return;
          }
          throw error;
        }

        renderMeta(user);
        if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "pending", "Waiting for Hold/Resume action.");
        renderStatusLines();
        startCentralHoldMonitor();
        const moduleName = getModuleName();
        if (!moduleName) {
          setStatus("GCB Ready. OAuth success. No business page selected.", "success");
          debugLog("INFO", "LANDING_READY", "Index status page loaded. No business page selected.");
          return;
        }
        await loadModule(moduleName);
      }

      start().catch(function (error) {
        const msg = error && (error.stack || error.message) ? (error.stack || error.message) : String(error);
        debugLog("ERROR", "INDEX_INIT_FAILED", msg);
        setStatus("GCB failed: " + (error && error.message ? error.message : String(error)), "error");
        renderStatusLines();
      });
    })();
  </script>
</body>
</html>
